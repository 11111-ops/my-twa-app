<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple TWA</title>
    <!-- Подключаем основной скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            /* Используем системные переменные темы Telegram */
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            padding: 10px 20px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1 id="greeting">Привет!</h1>
    <p>Это твое первое TWA-приложение.</p>
    <button id="mainButton">Закрыть приложение</button>

    <script>
        // Инициализация объекта WebApp
        const tg = window.Telegram.WebApp;

        // Сообщаем Telegram, что приложение готово к отображению
        tg.ready();

        // Берем имя пользователя из данных Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('greeting').innerText = `Привет, ${user.first_name}!`;
        }

        // Кнопка закрытия
        document.getElementById('mainButton').addEventListener('click', () => {
            tg.close();
        });

        // Можно также вывести главную кнопку в интерфейсе Telegram
        tg.MainButton.setText("ОТПРАВИТЬ ДАННЫЕ")
            .show()
            .onClick(() => {
                tg.sendData("Кнопка нажата!"); // Работает только в KeyboardButton приложениях
            });
    </script>
</body>
</html>
