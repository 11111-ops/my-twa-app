<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --pizza-orange: #FF5E00; /* Цвет сочной пиццы */
            --pizza-dark: #2D2D2D;
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
        }

        body {
            background-color: var(--sec-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header img {
            max-width: 150px; /* Сюда можно вставить логотип */
        }

        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .nav-card {
            background-color: var(--bg-color);
            border-radius: 16px;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s;
        }

        .nav-card:active {
            transform: scale(0.95);
            background-color: var(--sec-bg);
        }

        .nav-card i {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .nav-card span {
            font-weight: bold;
            font-size: 14px;
        }

        .order-btn {
            background-color: var(--pizza-orange);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 94, 0, 0.3);
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #888);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--pizza-orange);">ДОМ ПИЦЦЫ</h2>
    </div>

    <div class="category-grid">
        <!-- Кнопки ведут на разделы сайта -->
        <div class="nav-card" onclick="openLink('https://домпиццы.рф/catalog/pitstsa/')">
            <i>🍕</i>
            <span>Пицца</span>
        </div>

        <div class="nav-card" onclick="openLink('https://домпиццы.рф/catalog/rolly/')">
            <i>🍣</i>
            <span>Роллы</span>
        </div>

        <div class="nav-card" onclick="openLink('https://домпиццы.рф/catalog/zakuski/')">
            <i>🍟</i>
            <span>Закуски</span>
        </div>

        <div class="nav-card" onclick="openLink('https://домпиццы.рф/catalog/napitki/')">
            <i>🥤</i>
            <span>Напитки</span>
        </div>
    </div>

    <button class="order-btn" onclick="quickOrder()">⚡ Быстрый заказ</button>

    <div class="footer-link" onclick="openLink('https://домпиццы.рф/')">перейти на сайт домпиццы.рф</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Устанавливаем цвет шапки в цвет фона Telegram
        tg.setHeaderColor('secondary_bg_color');

        function openLink(url) {
            tg.openLink(url);
        }

        function quickOrder() {
            tg.HapticFeedback.impactOccurred('medium');
            // Отправляем данные боту
            tg.sendData("Клиент нажал 'Быстрый заказ'");
        }
    </script>
</body>
</html>
