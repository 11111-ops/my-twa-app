<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple TWA</title>
    <!-- ИСПРАВЛЕНО: Правильный путь к скрипту SDK -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            /* Используем нативные цвета Telegram */
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        .container {
            background-color: var(--tg-theme-bg-color);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 80%;
        }

        button {
            padding: 12px 24px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="greeting">Привет!</h1>
        <p>Это твое первое TWA-приложение.</p>
        <button id="closeBtn">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Обязательно вызываем ready
        tg.ready();
        // Расширяем на все окно
        tg.expand();

        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('greeting').innerText = `Привет, ${user.first_name}!`;
        }

        // Кнопка в самом HTML
        document.getElementById('closeBtn').addEventListener('click', () => {
            tg.close();
        });

        // Нижняя системная кнопка Telegram
        tg.MainButton.setText("ОТПРАВИТЬ ПРИВЕТ")
            .show()
            .onClick(() => {
                tg.sendData("Привет от TWA!"); 
            });
    </script>
</body>
</html>
